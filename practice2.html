<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALCULATOR</title>
  <link rel="stylesheet" href="practice2.css"/>
</head>
<body>
<div class="container">
  <p>
    <button onclick="
    calculation +='1';
    console.log(calculation);
    ">1</button>

  <button onclick="
  calculation +='2';
  console.log(calculation);
  ">2</button>

  <button onclick="
  calculation +='3';
  console.log(calculation);
  ">3</button>

  <button  id="sign" onclick="
  calculation += ' + '
  console.log(calculation);
  ">+</button>
  </p>

  <p>
    <button onclick="
      calculation +='4';
      console.log(calculation);
      ">4</button>

    <button onclick="
    calculation +='5';
      console.log(calculation);
    ">5</button>

    <button onclick="
    calculation +='6';
      console.log(calculation);
    ">6</button>

    <button id="sign" onclick="
    calculation +=' - ';
      console.log(calculation);
    ">-</button>

  </p>

  <p>
    <button onclick="
      calculation +='7';
      console.log(calculation);
      ">7</button>

    <button onclick="
    calculation +='8';
      console.log(calculation);
    ">8</button>

    <button onclick="
    calculation +='4';
      console.log(calculation); 
    ">9</button>

    <button  id="sign" onclick="
    calculation +=' * ';
      console.log(calculation);
    ">*</button>

  </p>

  <p>
    <button onclick="
      calculation +='0';
      console.log(calculation);
      ">0</button>

    <button onclick="
    calculation +=' . ';
      console.log(calculation);
    ">.</button>

    <button onclick="
  calculation = eval(calculation);
  console.log(calculation);
  ">=</button>

    <button id="sign" onclick="
    calculation +=' / ';
      console.log(calculation);
    ">/</button>

  </p>

  <p>
    <button id="clear" onclick="
      calculation +='';
      console.log('cleared');
      ">Clear</button>
  </p>
</div>

  
  
  
  <script src="practice2.js"></script>
</body>
</html>
